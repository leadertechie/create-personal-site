name = "{{name}}"
main = "prerender/index.ts"
compatibility_date = "2024-01-01"

[vars]
# SITE_TITLE and API_URL can be set here as defaults, 
# or provided via .dev.vars (local) and Cloudflare dashboard (production)
SITE_TITLE = "{{siteTitle}}"
API_URL = "https://your-site.workers.dev"

[assets]
directory = "./dist/ui"
binding = "ASSETS"

[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "{{name}}"

[[kv_namespaces]]
binding = "KV"
# Get this ID from: npx wrangler kv namespace create KV
id = "your-kv-namespace-id"
